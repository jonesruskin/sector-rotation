name: Update sector rotation data

on:
  schedule:
    # 16:05 IST, Mon-Fri = 10:35 UTC. NSE closes 15:30 IST; this gives the
    # bhavcopy file time to be published.
    - cron: "35 10 * * 1-5"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data & compute rotation
        run: python fetch_rotation_data.py

      - name: Commit updated data
        run: |
          git config user.name "sector-rotation-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/history.json data/rotation.json
          git diff --cached --quiet || git commit -m "Update rotation data $(date -u +'%Y-%m-%d')"
          git push
